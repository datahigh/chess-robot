# IK solver configuration for the chess_arm planning groups.
# KDL is the only installed kinematics plugin (trac_ik is NOT built in this
# workspace). The 6-DOF "arm" chain (base_link -> tcp) is solvable by KDL's
# numerical IK with the search/timeout below.
arm:
  kinematics_solver: kdl_kinematics_plugin/KDLKinematicsPlugin
  kinematics_solver_search_resolution: 0.005
  kinematics_solver_timeout: 0.05
