# ros2_control controller configuration for the chess_arm MoveIt sim target
# (ros2_control_hardware_type:=mock_components, with_world:=false).
#
# Spawned by the MoveIt demo/bringup launch via the controller_manager and
# ros2_control_node. Mirrors chess_arm_description/config/ros2_controllers.yaml
# so sim/mock and gz share identical controller wiring.
#
# Joints: only the six actuated arm joints + the single actuated gripper jaw
# (gripper_left_joint). gripper_right_joint is a URDF <mimic> follower and is
# NOT commanded -> it is intentionally absent from every controller and group.
controller_manager:
  ros__parameters:
    update_rate: 100  # Hz

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      # Lyrical replacement for the removed position_controllers/GripperActionController.
      # Serves control_msgs/action/ParallelGripperCommand at ~/gripper_cmd, which the
      # MoveItSimpleControllerManager ParallelGripperCommand handle drives directly.
      type: parallel_gripper_action_controller/GripperActionController

arm_controller:
  ros__parameters:
    joints:
      - J1_base_yaw
      - J2_shoulder_pitch
      - J3_elbow_pitch
      - J4_forearm_roll
      - J5_wrist_pitch
      - J6_wrist_roll
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_nonzero_velocity_at_trajectory_end: true

gripper_controller:
  ros__parameters:
    joint: gripper_left_joint
