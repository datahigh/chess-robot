# =============================================================================
# wrist_joint.cfg  --  moteus-c1 config for the Phase-1 wrist-class joint
# =============================================================================
# Subject: ONE bench joint. Gimbal BLDC + single-stage ~9:1 cycloidal reducer.
#          Onboard encoder (aux1) = rotor/commutation source. External AS5047P
#          (14-bit SPI, on aux2) = absolute OUTPUT-shaft position source.
#
# FORMAT: one `<register> <value>` per line. `#` introduces a comment and the
#         rest of the line is stripped before the value is sent. Apply with:
#             python3 -m moteus.moteus_tool --target 1 --restore-config wrist_joint.cfg
#         (--restore-config prepends `conf set` per line and runs `conf write`.
#          It strips `#` comments, so this commented file is safe to apply.
#          The lower-level `--write-config` sends lines VERBATIM and will NOT
#          strip comments -- use --restore-config for THIS file.)
#
# SCOPE: this file holds ONLY the registers we set deliberately for the joint
#        geometry, the AS5047P output source, and conservative safety limits.
#        It deliberately OMITS every motor-calibration-derived register
#        (motor.poles, servo.pid_dq.*, servo.encoder_filter.*,
#         motor_position.sources.0.sign/offset, motor.offset.*, ...). Those are
#        written by `moteus_tool --calibrate` and MUST be present on the device
#        BEFORE this file is applied. See calibration_and_tuning.md for order.
#
# CONVENTION REMINDERS (see moteus_joint_config.md for the full prose):
#   * rotor_to_output_ratio is OUTPUT-revs-per-ROTOR-rev, i.e. a FRACTION (<1)
#     for a reducer. 9:1  ->  1/9 = 0.111111. (Docs: 4x reduction -> 0.25.)
#   * After the ratio is set, EVERY position/velocity register below
#     (servopos.position_min/max, servo.max_velocity, COMMAND_POSITION, `d pos`)
#     is in OUTPUT-shaft revolutions.
#   * Reverse joint direction with sources.1.sign, NOT output.sign:
#     --calibrate temporarily forces output.sign to 1 (then restores it), so a
#     -1 there does not survive calibration; sources.1.sign does.
# =============================================================================

# ---- CAN node identity -------------------------------------------------------
id.id 1                                  # CAN node id for this wrist joint = target 1 (unique per joint, 1..126)

# ---- Gear reduction ----------------------------------------------------------
# TODO(mount): confirm the EXACT cycloidal ratio once the reducer is built.
# ~9:1 single stage is the design intent; if the printed pin/lobe count differs,
# update this to 1/actual_ratio. Value is OUTPUT-per-ROTOR (a fraction), NOT 9.0.
motor_position.rotor_to_output_ratio 0.111111   # = 1/9 ; output revs per rotor rev (reducer => <1). positions now in OUTPUT revs.

# ---- Commutation source (sources.0) = ONBOARD encoder on aux1 ----------------
# Onboard AS5047P stays the rotor-side commutation source. Auto-calibration
# ONLY runs when commutation_source == 0, so keep this index at 0.
# sources.0.sign and sources.0.offset are CAL-DERIVED -> written by --calibrate;
# do NOT set them here.
motor_position.commutation_source 0      # index into source list that drives commutation = onboard encoder (sources.0)
motor_position.sources.0.type 1          # 1 = SPI (onboard AS5047P is SPI)
motor_position.sources.0.aux_number 1    # onboard encoder is on aux1
motor_position.sources.0.cpr 16384       # onboard AS5047P counts/rev = 2^14
motor_position.sources.0.reference 0     # 0 = rotor-referenced (commutation source is rotor side)

# ---- Output source (sources.1) = EXTERNAL AS5047P on aux2 --------------------
# This is the joint-side absolute encoder reading a diametric magnet on the
# OUTPUT shaft (after the 9:1). It is a SEPARATE source from commutation.
aux2.spi.mode 2                          # 2 = AS5047P (CPR 16384) on aux2. (0 = onboard, aux1-only -- do NOT use here.)
aux2.spi.rate_hz 12000000                # 12 MHz SPI clock; AS5047P tolerates the default rate.
motor_position.sources.1.type 1          # 1 = SPI (external AS5047P on aux2)
motor_position.sources.1.aux_number 2    # output encoder is wired to aux2 (ABS connector)
motor_position.sources.1.cpr 16384       # AS5047P 14-bit -> 2^14 counts/rev
motor_position.sources.1.reference 1     # 1 = OUTPUT-referenced (this is the joint-side encoder)
motor_position.sources.1.pll_filter_hz 10  # low-cutoff PLL for an absolute output encoder (moteus_tool uses 10 Hz for abs sources)
motor_position.sources.1.offset 0        # integer raw-count offset; leave 0, joint zero is set via output.offset below
# TODO(mount): VERIFY DIRECTION after wiring. Turn the joint in its +angle
# direction; if reported POSITION / sources.1 counts DECREASE, set this to -1.
motor_position.sources.1.sign 1          # +1 normal; set -1 ONLY if joint direction is reversed (use this, not output.sign)

# ---- Output selection: AS5047P reports joint position ------------------------
motor_position.output.source 1           # index of the source used as OUTPUT position = aux2 AS5047P (sources.1)
motor_position.output.sign 1             # KEEP 1. --calibrate temporarily forces this to 1 during absolute-encoder mapping then restores it; reverse joint direction via sources.1.sign so it survives calibration.
motor_position.output.reference_source 1 # aux2 AS5047P is the ABSOLUTE output reference -> no homing across power cycles (-1 = none)
# TODO(mount): output.offset (joint zero / datum) is NOT set here. After the
# magnet is mounted and the joint is at its home pose, set it with:
#   python3 -m moteus.moteus_tool --target 1 --zero-offset
# (issues `d cfg-set-output 0`; old fw only supports 0.0). Do NOT hand-edit it.
motor_position.output.offset 0.0         # placeholder; OVERWRITTEN by --zero-offset / --set-offset after mounting (TODO).

# ---- Conservative safety limits (low-torque wrist joint) ---------------------
servo.max_current_A 2.0                  # hard phase-current cap. Low: tiny gimbal, little stored energy. Raise only if torque is insufficient.
servo.max_velocity 1.0                   # OUTPUT rev/s above which output power is DERATED (soft limit, paired w/ servo.max_velocity_derate) -- not a hard clamp. Hard per-move cap = make_position velocity_limit in the bench scripts.
servo.max_power_W 20.0                   # extra power ceiling for the low-torque joint (lower of this and the board profile applies).
# TODO(supply): set above the actual bus voltage. Assumes a 24 V supply.
servo.max_voltage 30.0                   # input over-voltage fault threshold; > 24 V supply with margin.

# ---- Software workspace limits (OUTPUT revs) ---------------------------------
# TODO(mount): replace with the joint's REAL mechanical travel once the wrist is
# assembled. +/-0.2 output rev = +/-72 deg, a safe placeholder. NaN disables.
servopos.position_min -0.2               # min control position in OUTPUT revs (~ -72 deg). Joint must never be driven below this.
servopos.position_max 0.2                # max control position in OUTPUT revs (~ +72 deg).

# ---- Command watchdog --------------------------------------------------------
# Backs the per-command watchdog (make_position(watchdog_timeout=) / COMMAND_TIMEOUT).
# If CAN traffic stops for default_timeout_s, the joint enters timeout_mode.
servo.default_timeout_s 0.5              # 0.5 s without a command -> timeout action.
servo.timeout_mode 0                     # 0 = stopped (unpowered) on timeout. Safest for a bench joint.

# ---- Position loop (HAND-TUNED, not auto-tuned) ------------------------------
# TODO(tune): --calibrate does NOT tune the position loop (only the current loop
# servo.pid_dq.* + encoder_filter). Tune kp/kd/ki by hand in tview per
# calibration_and_tuning.md. Start values below are deliberately gentle.
servo.pid_position.kp 1.0                # START LOW. Raise until stiff/just buzzing, then back off ~30%. Nm per output rev. TODO(tune).
servo.pid_position.kd 0.05              # add to damp kp ringing. Nm per (output rev/s). TODO(tune).
servo.pid_position.ki 0.0               # leave 0; add small only for residual steady-state error. TODO(tune if needed).
servo.pid_position.ilimit 0.0           # anti-windup clamp on the position integrator; raise only if ki is used.
