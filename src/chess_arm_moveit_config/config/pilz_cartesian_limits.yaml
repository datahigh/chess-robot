# Cartesian limits for the Pilz industrial motion planner. We plan with OMPL,
# not Pilz, so these are unused at runtime — but MoveItConfigsBuilder auto-loads
# this file as part of the standard config set, so it must exist. Conservative
# defaults (m/s, m/s^2, rad/s) suitable for the small chess arm.
cartesian_limits:
  max_trans_vel: 1.0
  max_trans_acc: 2.25
  max_trans_dec: -5.0
  max_rot_vel: 1.57
