# joint_limits.yaml allows the dynamics properties specified in the URDF to be overwritten or augmented as needed
# Specific joint properties can be changed with the keys [max_position, min_position, max_velocity, max_acceleration]
# Joint limits can be turned off with [has_velocity_limits, has_acceleration_limits, has_jerk_limits]
#
# Loaded by MoveItConfigsBuilder().joint_limits(...). Values mirror
# chess_arm_description/config/arm_params.yaml (velocity given there in deg/s,
# converted here to rad/s). The URDF carries no <limit> acceleration, so we add
# conservative MoveIt-side acceleration caps (~2x velocity in rad/s^2) for
# smooth trapezoidal time-parameterization; jerk limits are left off.
#
# Only the actuated joints are listed: J1..J6 and the single actuated gripper
# jaw gripper_left_joint. gripper_right_joint is a URDF mimic follower and is
# not a planning DOF, so it is omitted.

default_velocity_scaling_factor: 0.5
default_acceleration_scaling_factor: 0.5

joint_limits:
  J1_base_yaw:
    # 120 deg/s
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 4.1888
  J2_shoulder_pitch:
    # 100 deg/s
    has_velocity_limits: true
    max_velocity: 1.7453
    has_acceleration_limits: true
    max_acceleration: 3.4907
  J3_elbow_pitch:
    # 120 deg/s
    has_velocity_limits: true
    max_velocity: 2.0944
    has_acceleration_limits: true
    max_acceleration: 4.1888
  J4_forearm_roll:
    # 200 deg/s
    has_velocity_limits: true
    max_velocity: 3.4907
    has_acceleration_limits: true
    max_acceleration: 6.9813
  J5_wrist_pitch:
    # 200 deg/s
    has_velocity_limits: true
    max_velocity: 3.4907
    has_acceleration_limits: true
    max_acceleration: 6.9813
  J6_wrist_roll:
    # 300 deg/s
    has_velocity_limits: true
    max_velocity: 5.2360
    has_acceleration_limits: true
    max_acceleration: 10.4720
  gripper_left_joint:
    # 0.10 m/s prismatic jaw
    has_velocity_limits: true
    max_velocity: 0.1
    has_acceleration_limits: true
    max_acceleration: 0.5
